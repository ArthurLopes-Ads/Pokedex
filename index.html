<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pokedex Dark Theme</title>
    <!-- FontAwesome para os ícones -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link href="css/style.css" rel="stylesheet" />
  </head>
  <body>
    <div class="app-container">
      <!-- Barra de Pesquisa -->
      <div class="search-section">
        <input
          type="text"
          id="pokemon-filter"
          placeholder="Procurar por nome ou ID"
          autocomplete="off"
        />
        <button id="apply-filter" class="search-btn">
          <i class="fas fa-search"></i> Procurar
        </button>
      </div>

      <!-- Contador -->
      <div class="stats-bar">
        <i class="fas fa-circle-notch"></i>
        <span id="total-count">...</span> Pokémons
      </div>

      <!-- Grid de Pokémons -->
      <div id="pokemon-list" class="pokemon-grid"></div>

      <!-- Feedback Visual de Carregamento -->
      <div id="loading" class="loading-state d-none">
        <i class="fas fa-spinner fa-spin"></i> Carregando...
      </div>

      <!-- Botão Carregar Mais -->
      <div class="load-more-container">
        <button id="load-more" class="load-more-btn">+ Carregar mais</button>
      </div>
    </div>
    <script src="js/script.js"></script>
  </body>
</html>
